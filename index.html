<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2D1B0E">
<title>Инструкция по сборке — BizWood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
<style>
  :root {
    --wood-dark: #2D1B0E;
    --wood-mid: #6B3A1F;
    --wood-pale: #F5E6D3;
    --wood-cream: #FDF8F2;
    --accent: #D4721E;
    --accent-light: #F5A855;
    --text-primary: #1A0F07;
    --text-secondary: #6B4C35;
    --text-muted: #9E7A5E;
    --border: rgba(107, 58, 31, 0.18);
    --success: #2E7D32;
    --success-bg: #E8F5E9;
    --error: #B71C1C;
    --error-bg: #FFEBEE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--wood-cream); color: var(--text-primary); min-height: 100vh; min-height: 100dvh; }

  .header { background: var(--wood-dark); padding: 20px 24px 0; position: relative; overflow: hidden; }
  .header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
    pointer-events: none;
  }

  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; position: relative; }

  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 20px; height: 20px; fill: white; }
  .logo-text { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 600; color: white; letter-spacing: 0.3px; }
  .logo-text span { color: var(--accent-light); }

  /* LANG TOGGLE */
  .lang-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 3px; gap: 2px; flex-shrink: 0; }
  .lang-btn {
    border: none; background: transparent; color: rgba(255,255,255,0.55);
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    padding: 5px 12px; border-radius: 16px; cursor: pointer;
    transition: background 0.18s, color 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-btn.active { background: var(--accent); color: white; }

  .header-card { background: var(--wood-mid); border-radius: 16px 16px 0 0; padding: 24px 20px 28px; }
  .header-card h1 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 500; color: white; line-height: 1.3; margin-bottom: 6px; }
  .header-card p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.5; }

  .main { padding: 0 16px 40px; background: var(--wood-cream); }

  .search-card { background: white; border-radius: 0 0 20px 20px; padding: 24px 20px; border: 1px solid var(--border); border-top: none; margin-bottom: 20px; }
  .input-label { font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .input-wrap { position: relative; }
  .code-input {
    width: 100%; height: 56px; border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-primary); padding: 0 52px 0 16px; background: var(--wood-cream);
    outline: none; transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .code-input::placeholder { color: var(--text-muted); font-size: 16px; letter-spacing: 0; font-weight: 400; }
  .code-input:focus { border-color: var(--accent); background: white; }
  .input-clear {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; background: var(--border); border: none; border-radius: 50%;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 16px; line-height: 1; padding: 0;
  }
  .input-clear.visible { display: flex; }
  .search-btn {
    width: 100%; height: 52px; background: var(--accent); color: white; border: none; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px;
    transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .search-btn:active { transform: scale(0.98); background: var(--wood-mid); }
  .search-btn svg { width: 18px; height: 18px; fill: white; }
  .search-btn.loading { background: var(--text-muted); pointer-events: none; }

  .hint-block { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 20px; }
  .hint-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.3px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .hint-title svg { width: 16px; height: 16px; fill: var(--accent); flex-shrink: 0; }
  .steps { display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
  .step-num { width: 20px; height: 20px; background: var(--wood-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--wood-mid); flex-shrink: 0; margin-top: 1px; }
  .step strong { font-weight: 600; color: var(--text-primary); }

  .result { display: none; animation: slideUp 0.3s ease; }
  .result.visible { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-success { background: white; border: 1px solid rgba(46,125,50,0.25); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .result-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--success-bg); color: var(--success); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 20px; margin-bottom: 12px; }
  .result-badge svg { width: 13px; height: 13px; fill: var(--success); }
  .result-model { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; line-height: 1.3; }
  .result-code { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

  .pdf-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 54px; background: var(--wood-dark); color: white; text-decoration: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .pdf-btn:active { transform: scale(0.98); background: var(--wood-mid); }
  .pdf-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

  .tg-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 46px; background: transparent; color: #0088cc; border: 1.5px solid #0088cc; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; text-decoration: none; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .tg-btn:active { transform: scale(0.98); background: rgba(0,136,204,0.06); }
  .tg-btn svg { width: 18px; height: 18px; fill: #0088cc; flex-shrink: 0; }

  .result-error { background: var(--error-bg); border: 1px solid rgba(183,28,28,0.2); border-radius: 16px; padding: 18px 20px; display: flex; gap: 12px; align-items: flex-start; }
  .result-error svg { width: 22px; height: 22px; fill: var(--error); flex-shrink: 0; margin-top: 1px; }
  .result-error-text h3 { font-size: 15px; font-weight: 700; color: var(--error); margin-bottom: 4px; }
  .result-error-text p { font-size: 13px; color: #7B1F1F; line-height: 1.5; }
  .result-error-text a { color: var(--error); font-weight: 700; }

  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 32px; padding-bottom: 16px; }
  .footer a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
  .wa-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 46px; background: transparent; color: #25D366; border: 1.5px solid #25D366; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; text-decoration: none; margin-bottom: 16px; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .wa-btn:active { transform: scale(0.98); background: rgba(37,211,102,0.06); }
  .wa-btn svg { width: 20px; height: 20px; fill: #25D366; flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="top-row">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V8H3V5Z"/><path d="M3 8H21V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V8Z" opacity="0.6"/><rect x="9" y="8" width="6" height="4" rx="0.5"/><rect x="7" y="17" width="4" height="0.5" rx="0.25"/><rect x="13" y="17" width="4" height="0.5" rx="0.25"/></svg>
      </div>
      <div class="logo-text">Biz<span>Wood</span></div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" id="btn-kz" onclick="setLang('kz')">ҚАЗ</button>
    </div>
  </div>
  <div class="header-card">
    <h1 id="t-title"></h1>
    <p id="t-subtitle"></p>
  </div>
</div>

<div class="main">
  <div class="search-card">
    <label class="input-label" id="t-label" for="code-input"></label>
    <div class="input-wrap">
      <input type="text" id="code-input" class="code-input"
        autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" inputmode="text" maxlength="30">
      <button class="input-clear" id="clear-btn" onclick="clearInput()">✕</button>
    </div>
    <button class="search-btn" id="search-btn" onclick="doSearch()">
      <svg id="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <div class="spinner" id="spinner"></div>
      <span id="btn-text"></span>
    </button>
  </div>

  <div class="result" id="result-area"></div>

  <div class="hint-block" id="hint-block">
    <div class="hint-title">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      <span id="t-hint-title"></span>
    </div>
    <div class="steps" id="t-steps"></div>
  </div>

  <a class="wa-btn" href="https://wa.me/77783643897" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
    <span id="t-wa-btn">Написать в WhatsApp</span>
  </a>
  <div class="footer">
    <a href="https://www.instagram.com/bizwood.kz?igsh=M3Y2ZWp3N2kwdWhr" target="_blank" rel="noopener">bizwood.kz</a> — <span id="t-footer"></span>
  </div>
</div>

<script>
  // ====================================================
  // НАСТРОЙКА
  const SHEET_ID = '1z2SfANEQtYVaYAzJ8Bx4jWO7dyggY0V1JkrFeFF2_cw';
  const SHEET_GID = '0';
  const PUBLISHED_ID = '2PACX-1vQEj7Z3qUhLADZCcYbBs3VfDv90L5FPbTHljMUIDeU-hDsvAZR9vdbPL-vMRrXNANi_0T93F5dg5ZQO';
  const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?output=csv&gid=${SHEET_GID}`;
  const TELEGRAM_BOT = ''; // например 'bizwoodbot', оставьте пустым если нет
  const PHONE = '+77001234567';
  // ====================================================

  const T = {
    ru: {
      htmlLang: 'ru',
      pageTitle: 'Инструкция по сборке — BizWood',
      title: 'Инструкция по сборке кухни',
      subtitle: 'Введите код товара из приложения Kaspi — мы найдём вашу инструкцию',
      label: 'Код товара',
      placeholder: 'Введите код...',
      btnSearch: 'Найти инструкцию',
      btnLoading: 'Ищем...',
      hintTitle: 'Где найти код товара',
      steps: [
        'Откройте приложение <strong>Kaspi</strong>',
        'Перейдите в раздел <strong>Мои заказы</strong>',
        'Нажмите на нужный товар',
        'Откройте <strong>Характеристики</strong> → скопируйте <strong>Код товара</strong>',
      ],
      badge: 'Инструкция найдена',
      codeLabel: 'Код:',
      pdfBtn: 'Открыть инструкцию (PDF)',
      tgBtn: 'Открыть в Telegram',
      errTitle: 'Инструкция не найдена',
      errBody: (c) => `Код <strong>${c}</strong> не найден в базе.<br>Проверьте код и попробуйте снова.<br><br>Если ошибка повторяется — свяжитесь с нами: <a href="tel:${PHONE}">${PHONE}</a>`,
      netTitle: 'Ошибка подключения',
      netBody: 'Не удалось загрузить базу данных. Проверьте интернет и попробуйте снова.',
      footer: 'Кухни под заказ в Казахстане',
      waBtn: 'Написать в WhatsApp',
    },
    kz: {
      htmlLang: 'kk',
      pageTitle: 'Жинау нұсқаулығы — BizWood',
      title: 'Асүйді жинау нұсқаулығы',
      subtitle: 'Kaspi қосымшасындағы тауар кодын енгізіңіз — біз нұсқаулықты табамыз',
      label: 'Тауар коды',
      placeholder: 'Кодты енгізіңіз...',
      btnSearch: 'Нұсқаулықты табу',
      btnLoading: 'Іздеу...',
      hintTitle: 'Тауар кодын қайдан табуға болады',
      steps: [
        '<strong>Kaspi</strong> қосымшасын ашыңыз',
        '<strong>Менің тапсырыстарым</strong> бөліміне өтіңіз',
        'Қажетті тауарды басыңыз',
        '<strong>Сипаттамалар</strong> → <strong>Тауар коды</strong>-ын көшіріңіз',
      ],
      badge: 'Нұсқаулық табылды',
      codeLabel: 'Код:',
      pdfBtn: 'Нұсқаулықты ашу (PDF)',
      tgBtn: 'Telegram-да ашу',
      errTitle: 'Нұсқаулық табылмады',
      errBody: (c) => `<strong>${c}</strong> коды базадан табылмады.<br>Кодты тексеріп, қайталап көріңіз.<br><br>Қате қайталанса — бізге хабарласыңыз: <a href="tel:${PHONE}">${PHONE}</a>`,
      netTitle: 'Байланыс қатесі',
      netBody: 'Дерекқорды жүктеу мүмкін болмады. Интернетті тексеріп, қайталап көріңіз.',
      footer: 'Қазақстандағы тапсырысқа арналған асүйлер',
      waBtn: 'WhatsApp-қа жазу',
    }
  };

  // State
  function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }

  let lang = lsGet('bw_lang') || 'ru';
  let db = null;
  let lastFound = null; // {code, model, pdfUrl} — для перевода результата

  const input     = document.getElementById('code-input');
  const clearBtn  = document.getElementById('clear-btn');
  const resultArea= document.getElementById('result-area');
  const hintBlock = document.getElementById('hint-block');
  const searchBtn = document.getElementById('search-btn');
  const spinner   = document.getElementById('spinner');
  const searchIcon= document.getElementById('search-icon');
  const btnText   = document.getElementById('btn-text');

  function setLang(l) {
    lang = l;
    lsSet('bw_lang', l);
    const t = T[l];

    document.documentElement.lang = t.htmlLang;
    document.title = t.pageTitle;
    document.getElementById('t-title').textContent = t.title;
    document.getElementById('t-subtitle').textContent = t.subtitle;
    document.getElementById('t-label').textContent = t.label;
    input.placeholder = t.placeholder;
    btnText.textContent = t.btnSearch;
    document.getElementById('t-hint-title').textContent = t.hintTitle;
    document.getElementById('t-footer').textContent = t.footer;
    document.getElementById('t-wa-btn').textContent = t.waBtn;
    document.getElementById('btn-ru').classList.toggle('active', l === 'ru');
    document.getElementById('btn-kz').classList.toggle('active', l === 'kz');

    // Steps
    document.getElementById('t-steps').innerHTML = t.steps
      .map((html, i) => `<div class="step"><div class="step-num">${i+1}</div><div>${html}</div></div>`)
      .join('');

    // Re-render result in new language without scroll
    if (lastFound) showSuccess(lastFound.code, lastFound.model, lastFound.pdfUrl, false);
    else if (resultArea.dataset.errCode) showError(resultArea.dataset.errCode, false);
  }

  // Input events
  input.addEventListener('input', () => {
    clearBtn.classList.toggle('visible', input.value.length > 0);
  });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

  function clearInput() {
    input.value = '';
    clearBtn.classList.remove('visible');
    input.focus();
    lastFound = null;
    delete resultArea.dataset.errCode;
    resultArea.classList.remove('visible');
    resultArea.innerHTML = '';
    hintBlock.style.display = '';
  }

  function setLoading(on) {
    const t = T[lang];
    searchBtn.classList.toggle('loading', on);
    spinner.style.display = on ? 'block' : 'none';
    searchIcon.style.display = on ? 'none' : 'block';
    btnText.textContent = on ? t.btnLoading : t.btnSearch;
  }

  function esc(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  const PDF_ICON = `<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V9H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V9H15c.83 0 1.5.67 1.5 1.5v1zm4-3H19v1h1.5V11H19v2h-1.5V9h3v1.5zM9 10h1v.5H9V10zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm8 5h1v-1.5h-1V11z"/></svg>`;
  const TG_ICON  = `<svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>`;
  const ERR_ICON = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;
  const OK_ICON  = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

  function showSuccess(code, model, pdfUrl, scroll = true) {
    const t = T[lang];
    lastFound = { code, model, pdfUrl };
    delete resultArea.dataset.errCode;
    hintBlock.style.display = 'none';

    resultArea.innerHTML = `
      <div class="result-success">
        <div class="result-badge">${OK_ICON} ${t.badge}</div>
        ${model ? `<div class="result-model">${esc(model)}</div>` : ''}
        <div class="result-code">${t.codeLabel} ${esc(code)}</div>
        <a class="pdf-btn" href="${esc(pdfUrl)}" target="_blank" rel="noopener">
          ${PDF_ICON} ${t.pdfBtn}
        </a>
        ${TELEGRAM_BOT ? `
        <a class="tg-btn" href="https://t.me/${TELEGRAM_BOT}?start=${encodeURIComponent(code)}" target="_blank" rel="noopener">
          ${TG_ICON} ${t.tgBtn}
        </a>` : ''}
      </div>`;
    resultArea.classList.add('visible');
    if (scroll) resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showError(code, scroll = true) {
    const t = T[lang];
    lastFound = null;
    resultArea.dataset.errCode = code;
    hintBlock.style.display = 'none';

    resultArea.innerHTML = `
      <div class="result-error">
        ${ERR_ICON}
        <div class="result-error-text">
          <h3>${t.errTitle}</h3>
          <p>${t.errBody(esc(code))}</p>
        </div>
      </div>`;
    resultArea.classList.add('visible');
    if (scroll) resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function parseCSV(text) {
    const rows = [], lines = text.split('\n');
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = []; let inQ = false, cur = '';
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; continue; }
        if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
        cur += ch;
      }
      cols.push(cur);
      if (cols.length >= 2) rows.push(cols);
    }
    return rows;
  }

  async function loadDB() {
    if (db) return db;
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    db = parseCSV(await res.text());
    return db;
  }

  async function doSearch() {
    const code = input.value.trim().replace(/\s+/g, '');
    if (!code) { input.focus(); return; }

    setLoading(true);
    lastFound = null;
    delete resultArea.dataset.errCode;
    resultArea.classList.remove('visible');
    resultArea.innerHTML = '';
    hintBlock.style.display = 'none';

    try {
      const rows = await loadDB();
      const found = rows.find(r => r[0].trim().replace(/\s+/g, '') === code);
      if (found) showSuccess(code, found[1] ? found[1].trim() : '', found[2] ? found[2].trim() : found[1].trim());
      else showError(code);
    } catch {
      const t = T[lang];
      resultArea.innerHTML = `
        <div class="result-error">${ERR_ICON}
          <div class="result-error-text"><h3>${t.netTitle}</h3><p>${t.netBody}</p></div>
        </div>`;
      resultArea.classList.add('visible');
    }

    setLoading(false);
  }

  // Init
  setLang(lang);
</script>
</body>
</html>
